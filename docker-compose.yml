version: '3.8'

services:
  fnmusic:
    image: python:3.11-slim
    container_name: fnmusic
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./data:/app/data
      - ./music:/app/data/music
    working_dir: /app
    environment:
      - DATABASE_URL=sqlite:///./data/music.db
      - MUSIC_DIR=/app/data/music
      - SECRET_KEY=please-change-this-secret-key
      - DEBUG=false
    command: >
      bash -c "pip install -r requirements.txt -q &&
      python run.py"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
